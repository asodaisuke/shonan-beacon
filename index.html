<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHONAN CENTRAL BEACON | BOARDROOM</title>
  <script>
    if (window.self !== window.top) { window.top.location.href = window.location.href; }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070d1a; --bg2: #0d1829; --gold: #c9a227; --gold-lt: #f0d060;
      --cyan: #00f2ff; --text: #e2e8f0; --muted: #4a5568;
      --card: rgba(255,255,255,0.032); --border: rgba(201,162,39,0.18);
      --secretary: #3b82f6; --manager: #22c55e; --planner: #c9a227;
      --sns: #a855f7; --devil: #ef4444; --advisor: #94a3b8;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'Montserrat', 'Noto Sans JP', sans-serif; color: var(--text); }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(0,200,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,.03) 1px, transparent 1px); background-size: 44px 44px; pointer-events: none; }
    .z1 { position: relative; z-index: 1; }

    /* ── ヘッダー ── */
    .hdr { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px 10px; border-bottom: 1px solid var(--border); }
    .logo-name { font-size: 15px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(120deg, #a37a15, var(--gold), var(--gold-lt), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200%; animation: gold-shift 4s linear infinite; }
    @keyframes gold-shift { 0%{background-position:0%} 100%{background-position:200%} }

    /* ── アイコンバー ── */
    .agent-bar { flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 12px 24px; border-bottom: 1px solid var(--border); }
    .agent-slot { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 0 12px; }
    .portrait-wrap { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--border); overflow: hidden; position: relative; background: var(--bg2); }
    .agent-sprite { position: absolute; width: 630%; height: auto; pointer-events: none; }
    .agent-id { font-size: 9px; font-weight: 900; color: var(--muted); letter-spacing: 1px; margin-top: 4px; }
    .agent-slot.thinking .portrait-wrap { animation: think-glow 1.2s ease-in-out infinite; }
    @keyframes think-glow { 0%,100% { box-shadow: 0 0 10px rgba(201,162,39,.5); } 50% { box-shadow: 0 0 25px var(--gold); } }

    /* ── ボディグリッド（7列） ── */
    .body-grid { flex: 1; display: flex; padding: 12px 24px 0; overflow: hidden; }
    .chat-wrap { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
    .agent-cols { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 10px; overflow: hidden; }
    .agent-col { display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,.05); border-radius: 12px; background: rgba(255,255,255,.01); }
    .agent-col-hdr { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,.07); font-size: 10px; font-weight: 900; text-align: center; }
    .agent-col-body { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; }
    .col-msg { background: rgba(255,255,255,.04); border-radius: 8px; padding: 12px; font-size: 11px; line-height: 1.7; border-left: 3px solid; white-space: pre-wrap; word-break: break-word; }

    /* エージェントカラー設定 */
    .col-secretary .agent-col-hdr { color: var(--secretary); border-top: 3px solid var(--secretary); } .col-secretary .col-msg { border-color: var(--secretary); }
    .col-manager .agent-col-hdr { color: var(--manager); border-top: 3px solid var(--manager); } .col-manager .col-msg { border-color: var(--manager); }
    .col-planner .agent-col-hdr { color: var(--planner); border-top: 3px solid var(--planner); } .col-planner .col-msg { border-color: var(--planner); }
    .col-sns .agent-col-hdr { color: var(--sns); border-top: 3px solid var(--sns); } .col-sns .col-msg { border-color: var(--sns); }
    .col-devil .agent-col-hdr { color: var(--devil); border-top: 3px solid var(--devil); } .col-devil .col-msg { border-color: var(--devil); }
    .col-advisor .agent-col-hdr { color: var(--advisor); border-top: 3px solid var(--advisor); } .col-advisor .col-msg { border-color: var(--advisor); }
    .col-interrogation .agent-col-hdr { color: var(--cyan); border-top: 3px solid var(--cyan); } .col-interrogation .col-msg { border-color: var(--cyan); }

    /* ── フッター ── */
    .input-footer { padding: 16px 24px 20px; border-top: 1px solid var(--border); }
    .input-main { display: flex; gap: 12px; }
    .text-field { flex: 1; background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--text); resize: none; min-height: 50px; font-size: 14px; }
    .exec-btn { width: 130px; background: linear-gradient(135deg, var(--gold), var(--gold-lt)); border: none; border-radius: 12px; font-weight: 900; cursor: pointer; color: #000; letter-spacing: 2px; }

    .loading-veil { display: none; position: fixed; inset: 0; background: rgba(7,13,26,0.9); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
    .loading-veil.on { display: flex; }
  </style>
</head>
<body>

<header class="hdr z1">
  <div class="logo-name">SHONAN CENTRAL BEACON</div>
  <div id="clock" style="font-size: 18px; font-weight: 200;">--:--</div>
</header>

<div class="agent-bar z1">
  <div class="agent-slot" id="slot-SECRETARY"><div class="portrait-wrap" id="pw-SECRETARY"></div><div class="agent-id">秘書</div></div>
  <div class="agent-slot" id="slot-MANAGER"><div class="portrait-wrap" id="pw-MANAGER"></div><div class="agent-id">マネージャー</div></div>
  <div class="agent-slot" id="slot-PLANNER"><div class="portrait-wrap" id="pw-PLANNER"></div><div class="agent-id">プランナー</div></div>
  <div class="agent-slot" id="slot-SNS"><div class="portrait-wrap" id="pw-SNS"></div><div class="agent-id">SNS</div></div>
  <div class="agent-slot" id="slot-DEVIL"><div class="portrait-wrap" id="pw-DEVIL"></div><div class="agent-id">Devil</div></div>
  <div class="agent-slot" id="slot-ADVISOR"><div class="portrait-wrap" id="pw-ADVISOR"></div><div class="agent-id">相談役</div></div>
</div>

<div class="body-grid z1">
  <div class="chat-wrap">
    <div class="agent-cols">
      <div class="agent-col col-secretary"><div class="agent-col-hdr">📋 秘書</div><div class="agent-col-body" id="colbody-SECRETARY"></div></div>
      <div class="agent-col col-manager"><div class="agent-col-hdr">📈 マネージャー</div><div class="agent-col-body" id="colbody-MANAGER"></div></div>
      <div class="agent-col col-planner"><div class="agent-col-hdr">💡 プランナー</div><div class="agent-col-body" id="colbody-PLANNER"></div></div>
      <div class="agent-col col-sns"><div class="agent-col-hdr">📱 SNS</div><div class="agent-col-body" id="colbody-SNS"></div></div>
      <div class="agent-col col-devil"><div class="agent-col-hdr">😈 Devil</div><div class="agent-col-body" id="colbody-DEVIL"></div></div>
      <div class="agent-col col-advisor"><div class="agent-col-hdr">👴 相談役</div><div class="agent-col-body" id="colbody-ADVISOR"></div></div>
      <div class="agent-col col-interrogation"><div class="agent-col-hdr">▸ INTERROGATION</div><div class="agent-col-body" id="colbody-INTERROGATION"></div></div>
    </div>
  </div>
</div>

<div class="input-footer z1">
  <div class="input-main">
    <textarea id="textField" class="text-field" placeholder="経営課題を入力してください..."></textarea>
    <button class="exec-btn" id="execBtn" onclick="startAnalysis()">EXECUTE</button>
  </div>
</div>

<div class="loading-veil" id="loadVeil"><div class="logo-name">ANALYZING...</div></div>

<script>
  const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzKBCWxdwhsW4mSA0V1e3BNOsmreIc4D1n-wsPBvnmGvhe71Pz1XOdO7_EUDA-GYosuQA/exec';
  const DRIVE_FILE_ID = '1RtTNCmLyT3Wt85tHgor95DBGTECnWSAH';
  const AGENT_SPRITE_URL = `https://drive.google.com/thumbnail?id=${DRIVE_FILE_ID}&sz=w1200`;

  const SPRITE_CONFIG = {
    SECRETARY: '-45%', MANAGER: '-148%', PLANNER: '-250%', SNS: '-352%', DEVIL: '-418%', ADVISOR: '-515%'
  };

  const AGENT_KEYS = ['SECRETARY', 'MANAGER', 'PLANNER', 'SNS', 'DEVIL', 'ADVISOR'];
  
  // ★重要：正規表現を最新の役職名に完全対応
  const AGENT_REGEX = {
    SECRETARY: /\[(?:秘書|SECRETARY|CMO)\][:：]?\s*([\s\S]*?)(?=\[(?:マネージャー|プランナー|SNS|Devil|相談役|CFO|COO|CLO|ADVISOR)\]|$)/i,
    MANAGER:   /\[(?:マネージャー|MANAGER|CFO)\][:：]?\s*([\s\S]*?)(?=\[(?:秘書|プランナー|SNS|Devil|相談役|CMO|COO|CLO|ADVISOR)\]|$)/i,
    PLANNER:   /\[(?:プランナー|PLANNER|COO)\][:：]?\s*([\s\S]*?)(?=\[(?:秘書|マネージャー|SNS|Devil|相談役|CMO|CFO|CLO|ADVISOR)\]|$)/i,
    SNS:       /\[(?:SNS|CLO)\][:：]?\s*([\s\S]*?)(?=\[(?:秘書|マネージャー|プランナー|Devil|相談役|CMO|CFO|COO|ADVISOR)\]|$)/i,
    DEVIL:     /\[(?:Devil|DEVIL|デビル)\][:：]?\s*([\s\S]*?)(?=\[(?:秘書|マネージャー|プランナー|SNS|相談役|CMO|CFO|COO|CLO|ADVISOR)\]|$)/i,
    ADVISOR:   /\[(?:相談役|ADVISOR)\][:：]?\s*([\s\S]*?)(?=\[(?:秘書|マネージャー|プランナー|SNS|Devil|CMO|CFO|COO|CLO)\]|$)/i
  };

  window.addEventListener('load', () => {
    AGENT_KEYS.forEach(key => {
      const wrap = document.getElementById('pw-' + key);
      const img = document.createElement('img');
      img.className = 'agent-sprite';
      img.src = AGENT_SPRITE_URL;
      img.style.left = SPRITE_CONFIG[key];
      img.style.marginTop = (key === 'DEVIL') ? '45px' : '20px';
      wrap.appendChild(img);
    });
  });

  function tick() {
    const n = new Date();
    document.getElementById('clock').textContent = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  }
  setInterval(tick, 1000); tick();

  async function startAnalysis() {
    const input = document.getElementById('textField').value.trim();
    if (!input) return;
    
    AGENT_KEYS.forEach(k => document.getElementById('slot-' + k).classList.add('thinking'));
    document.getElementById('loadVeil').classList.add('on');

    try {
      const res = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ mode: 'CHATTING', userInput: input }) });
      const result = await res.json();
      if (result.status === 'success') { renderResult(result.data); }
    } catch (e) { console.error(e); }
    
    document.getElementById('loadVeil').classList.remove('on');
    AGENT_KEYS.forEach(k => document.getElementById('slot-' + k).classList.remove('thinking'));
  }

  function renderResult(aiText) {
    AGENT_KEYS.forEach((k, i) => {
      setTimeout(() => {
        const match = aiText.match(AGENT_REGEX[k]);
        let text = match ? match[1].trim() : (i === 0 ? aiText : "");
        
        // ゴミ（システムタグ）の除去
        text = text.replace(/^"?[A-Z]+"?:?\s*/, '').replace(/"$/, '').trim();

        if (text && text.length > 5) {
          const body = document.getElementById('colbody-' + k);
          const div = document.createElement('div');
          div.className = 'col-msg';
          div.innerText = text;
          body.appendChild(div);
          body.scrollTop = body.scrollHeight;
        }
      }, i * 500);
    });
  }
</script>
</body>
</html>
