<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHONAN CENTRAL BEACON | BOARDROOM</title>

  <script>
    if (window.self !== window.top) {
      window.top.location.href = window.location.href;
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,300&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #070d1a;
      --bg2:        #0d1829;
      --gold:       #c9a227;
      --gold-lt:    #f0d060;
      --cyan:       #00f2ff;
      --navy:       #1a2a5e;
      --text:       #e2e8f0;
      --muted:      #4a5568;
      --card:       rgba(255,255,255,0.032);
      --border:     rgba(201,162,39,0.18);
      /* 新体制のカラーパレット */
      --secretary:  #3b82f6; /* 青: 冷静な秘書 */
      --sales:      #22c55e; /* 緑: 活気ある営業 */
      --planner:    #c9a227; /* 金: 統括プランナー */
      --marketing:  #a855f7; /* 紫: クリエイティブなマーケ */
      --devil:      #ef4444; /* 赤: 警告のデビル */
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); }

    body {
      font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
      color: var(--text);
      display: flex; flex-direction: column;
    }

    /* ─── GRID BACKGROUND ─── */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,200,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,.035) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    body::after {
      content: ''; position: fixed; bottom: 0; left: 0; right: 0; height: 35vh;
      background: radial-gradient(ellipse at 50% 110%, rgba(0,90,200,.14) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    .z1 { position: relative; z-index: 1; }

    .hdr {
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: space-between; padding: 14px 24px 10px;
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { font-size: 26px; }
    .logo-name {
      font-size: 15px; font-weight: 900; letter-spacing: 3px;
      background: linear-gradient(120deg, #a37a15, var(--gold), var(--gold-lt), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-size: 200%; animation: gold-shift 4s linear infinite;
    }
    @keyframes gold-shift { 0%{background-position:0%} 100%{background-position:200%} }
    .logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }

    .hdr-right { display: flex; align-items: center; gap: 16px; }
    .sys-badge {
      font-size: 10px; letter-spacing: 1.5px; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .live-dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      animation: dot-blink 2s ease-in-out infinite;
    }
    @keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:.15} }
    .clock { font-size: 18px; font-weight: 200; letter-spacing: 2px; color: var(--text); }

    .agent-bar {
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      gap: 0; padding: 12px 24px 10px;
      border-bottom: 1px solid var(--border);
    }
    .agent-slot {
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      padding: 6px 28px; cursor: pointer;
      transition: transform .35s ease;
    }
    .agent-slot:hover { transform: translateY(-2px); }

    .portrait-wrap {
      width: 92px; height: 92px; border-radius: 50%;
      border: 2px solid var(--border); overflow: hidden;
      position: relative; transition: all .5s ease;
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
    }
    .portrait-emoji { font-size: 38px; line-height: 1; transition: opacity .4s; }

    .agent-slot .portrait-wrap { filter: grayscale(85%); opacity: .4; }

    .agent-slot.active .portrait-wrap {
      filter: grayscale(0%); opacity: 1;
      border-color: var(--cyan);
      box-shadow: 0 0 22px var(--cyan), 0 0 50px rgba(0,242,255,.28);
      transform: scale(1.07);
    }

    .agent-slot.thinking .portrait-wrap {
      filter: grayscale(40%); opacity: .75;
      border-color: var(--gold);
      animation: think-glow 1s ease-in-out infinite;
    }
    @keyframes think-glow {
      0%,100% { box-shadow: 0 0 12px rgba(201,162,39,.5); }
      50%      { box-shadow: 0 0 28px rgba(201,162,39,.9), 0 0 48px rgba(201,162,39,.25); }
    }

    .agent-id {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      color: var(--muted); transition: color .3s;
    }
    .agent-slot.active  .agent-id { color: var(--cyan); }
    .agent-slot.thinking .agent-id { color: var(--gold); }
    .agent-role { font-size: 9px; letter-spacing: .5px; color: rgba(255,255,255,.2); }

    .bar-divider {
      width: 1px; height: 64px; flex-shrink: 0;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
    }

    .body-grid {
      flex: 1; display: grid; grid-template-columns: 1fr 360px;
      gap: 14px; padding: 14px 24px 0; min-height: 0; overflow: hidden;
    }

    .chat-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; min-height: 0;
    }
    .chat-hdr {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .chat-hdr-lbl { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; color: var(--gold); }

    .chat-log {
      flex: 1; overflow-y: auto; padding: 14px 14px 8px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-log::-webkit-scrollbar { width: 3px; }
    .chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chat-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; color: var(--muted); padding: 40px; text-align: center;
    }
    .empty-icon { font-size: 38px; opacity: .3; }
    .empty-lbl  { font-size: 11px; letter-spacing: 1.2px; line-height: 1.9; }

    .chat-msg {
      display: flex; gap: 11px; align-items: flex-start;
      animation: msg-drop .4s ease both;
    }
    @keyframes msg-drop { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    .msg-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      overflow: hidden; border: 1px solid;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; background: var(--bg2);
    }
    
    /* 新体制のアバター色 */
    .msg-avatar.a-user      { border-color: var(--gold); }
    .msg-avatar.a-secretary { border-color: var(--secretary); }
    .msg-avatar.a-sales     { border-color: var(--sales); }
    .msg-avatar.a-planner   { border-color: var(--planner); }
    .msg-avatar.a-marketing { border-color: var(--marketing); }
    .msg-avatar.a-devil     { border-color: var(--devil); }

    .msg-body { flex: 1; min-width: 0; }
    .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; }
    .msg-name { font-size: 10px; font-weight: 700; letter-spacing: 1px; }
    .msg-ts   { font-size: 9px; color: var(--muted); }

    .msg-bubble {
      font-size: 13px; line-height: 1.82;
      background: rgba(255,255,255,.038);
      border-radius: 0 10px 10px 10px;
      padding: 10px 14px; border-left: 2px solid;
      font-family: 'Noto Sans JP', sans-serif; font-weight: 300;
      white-space: pre-wrap; word-break: break-word;
    }
    
    /* 新体制の吹き出し色 */
    .chat-msg.a-user      .msg-bubble { border-color: var(--gold);  background: rgba(201,162,39,.07); }
    .chat-msg.a-secretary .msg-bubble { border-color: var(--secretary); }
    .chat-msg.a-sales     .msg-bubble { border-color: var(--sales); }
    .chat-msg.a-planner   .msg-bubble { border-color: var(--planner); }
    .chat-msg.a-marketing .msg-bubble { border-color: var(--marketing); }
    .chat-msg.a-devil     .msg-bubble { border-color: var(--devil); }

    .right-col { display: flex; flex-direction: column; gap: 12px; min-height: 0; overflow-y: auto; }
    .right-col::-webkit-scrollbar { width: 3px; }
    .right-col::-webkit-scrollbar-thumb { background: var(--border); }

    .r-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; flex-shrink: 0;
    }
    .r-card-title {
      font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
      color: var(--cyan); margin-bottom: 12px;
    }
    .r-placeholder { font-size: 11px; color: var(--muted); line-height: 1.8; letter-spacing: .5px; }

    .input-footer {
      flex-shrink: 0; padding: 10px 24px 14px;
      border-top: 1px solid var(--border);
    }
    .input-top-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }
    .mission-lbl { font-size: 9px; letter-spacing: 2px; color: var(--muted); white-space: nowrap; }
    .mission-sel {
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 5px 10px;
      font-size: 12px; font-family: inherit; outline: none; cursor: pointer;
    }
    .mode-pills { display: flex; gap: 5px; margin-left: auto; }
    .pill {
      padding: 5px 13px; border: 1px solid var(--border);
      border-radius: 20px; background: transparent;
      color: var(--muted); font-size: 10px; font-weight: 700;
      letter-spacing: 1px; cursor: pointer;
    }
    .pill.on { border-color: var(--gold); color: var(--gold); background: rgba(201,162,39,.09); }

    .input-main { display: flex; gap: 10px; align-items: flex-end; }

    .text-field {
      flex: 1; background: rgba(255,255,255,.04);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 11px 15px; color: var(--text); font-size: 14px;
      outline: none; resize: none; line-height: 1.55;
      font-family: 'Noto Sans JP', sans-serif; font-weight: 300;
      min-height: 44px; max-height: 110px;
    }
    .exec-btn {
      width: 110px; height: 44px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #8a6210, var(--gold), var(--gold-lt), var(--gold));
      background-size: 300%; background-position: 0%;
      color: #050505; font-size: 11px; font-weight: 900; letter-spacing: 2.5px;
      cursor: pointer; flex-shrink: 0; transition: all .35s;
    }
    .exec-btn:hover { background-position: 100%; box-shadow: 0 4px 24px rgba(201,162,39,.55); transform: translateY(-1px); }
    .exec-btn:disabled { background: #1e2a3a; color: var(--muted); cursor: not-allowed; }

    .loading-veil {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(7,13,26,.92); backdrop-filter: blur(10px);
      flex-direction: column; align-items: center; justify-content: center; gap: 22px;
    }
    .loading-veil.on { display: flex; }
    .radar { width: 80px; height: 80px; position: relative; }
    .r-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1px solid var(--cyan); opacity: 0;
      animation: r-expand 2s ease-out infinite;
    }
    .r-ring:nth-child(2){animation-delay:.6s}
    .r-ring:nth-child(3){animation-delay:1.2s}
    @keyframes r-expand { 0%{transform:scale(.2);opacity:.9} 100%{transform:scale(2.5);opacity:0} }
    .r-core {
      position: absolute; inset: 36%;
      background: var(--cyan); border-radius: 50%;
      box-shadow: 0 0 18px var(--cyan), 0 0 40px rgba(0,242,255,.4);
    }
    .l-title { font-size: 13px; font-weight: 700; letter-spacing: 3px; color: rgba(255,255,255,.9); }

    .toast {
      position: fixed; top: 24px; right: 24px;
      background: rgba(7,13,26,.96); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px; font-size: 13px; font-weight: 600;
      color: var(--text); box-shadow: 0 8px 28px rgba(0,0,0,.4);
      transform: translateX(120%); transition: transform .4s cubic-bezier(.34,1.56,.64,1);
      z-index: 300;
    }
    .toast.show { transform: translateX(0); }
    .toast.ok   { border-color: var(--sales); }
    .toast.err  { border-color: var(--devil); }
  </style>
</head>
<body>

<header class="hdr z1">
  <div class="logo">
    <span class="logo-icon">🏮</span>
    <div>
      <div class="logo-name">SHONAN CENTRAL BEACON</div>
      <div class="logo-sub">STRATEGIC BOARDROOM &nbsp;|&nbsp; PCDEPOT 湘南エリア 5店舗</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="sys-badge"><span class="live-dot"></span><span>SYSTEM ONLINE</span></div>
    <div class="clock" id="clock">--:--</div>
  </div>
</header>

<div class="agent-bar z1">
  <div class="agent-slot" id="slot-SECRETARY" data-key="SECRETARY">
    <div class="portrait-wrap"><span class="portrait-emoji">📋</span></div>
    <div class="agent-id">秘書</div><div class="agent-role">SECRETARY</div>
  </div>
  <div class="bar-divider"></div>
  <div class="agent-slot" id="slot-SALES" data-key="SALES">
    <div class="portrait-wrap"><span class="portrait-emoji">📈</span></div>
    <div class="agent-id">営業部長</div><div class="agent-role">SALES</div>
  </div>
  <div class="bar-divider"></div>
  <div class="agent-slot" id="slot-PLANNER" data-key="PLANNER">
    <div class="portrait-wrap"><span class="portrait-emoji">💡</span></div>
    <div class="agent-id">プランナー</div><div class="agent-role">PLANNER</div>
  </div>
  <div class="bar-divider"></div>
  <div class="agent-slot" id="slot-MARKETING" data-key="MARKETING">
    <div class="portrait-wrap"><span class="portrait-emoji">📱</span></div>
    <div class="agent-id">マーケSNS</div><div class="agent-role">MARKETING</div>
  </div>
  <div class="bar-divider"></div>
  <div class="agent-slot" id="slot-DEVIL" data-key="DEVIL">
    <div class="portrait-wrap"><span class="portrait-emoji">😈</span></div>
    <div class="agent-id">デビル</div><div class="agent-role">ADVOCATE</div>
  </div>
</div>

<div class="body-grid z1">
  <div class="chat-wrap">
    <div class="chat-hdr"><span class="live-dot"></span><span class="chat-hdr-lbl">ANALYSIS LOG</span></div>
    <div class="chat-log" id="chatLog">
      <div class="chat-empty" id="chatEmpty">
        <div class="empty-icon">⚡</div>
        <div class="empty-lbl">MISSION INPUT 待機中<br>5名のAI参謀が命令を待っています</div>
      </div>
    </div>
  </div>
  <div class="right-col">
    <div class="r-card">
      <div class="r-card-title">▸ INTERROGATION LOG</div>
      <div class="r-placeholder">AIからの逆質問がここに表示されます</div>
    </div>
  </div>
</div>

<div class="input-footer z1">
  <div class="input-top-row">
    <span class="mission-lbl">MISSION</span>
    <select class="mission-sel"><option>週次経営会議</option><option>店舗改善</option><option>エリア合同</option></select>
    <div class="mode-pills">
      <button class="pill on">TEXT</button><button class="pill">VOICE</button><button class="pill">FILE</button>
    </div>
  </div>
  <div class="input-main">
    <textarea id="textField" class="text-field" placeholder="経営課題を入力してください..."></textarea>
    <button class="exec-btn" id="execBtn" onclick="startAnalysis()">EXECUTE</button>
  </div>
</div>

<div class="loading-veil" id="loadVeil">
  <div class="radar"><div class="r-ring"></div><div class="r-ring"></div><div class="r-core"></div></div>
  <div class="l-title">ANALYZING MISSION</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ★ 代表のGASデプロイURL
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwEYIHLeXsmrNOdKTU_7ONx2IFh76Iu2lfqoFeGxXAhrVSAnvwyzn44AESyEIBc04CyWQ/exec';

// 新体制のキーボード（参謀のID）
const AGENT_KEYS   = ['SECRETARY', 'SALES', 'PLANNER', 'MARKETING', 'DEVIL'];
const AGENT_COLORS = { SECRETARY:'#3b82f6', SALES:'#22c55e', PLANNER:'#c9a227', MARKETING:'#a855f7', DEVIL:'#ef4444' };
const AGENT_LABELS = { SECRETARY:'秘書', SALES:'営業部長', PLANNER:'プランナー', MARKETING:'マーケ・SNS', DEVIL:'デビル' };
const AGENT_EMOJI  = { SECRETARY:'📋', SALES:'📈', PLANNER:'💡', MARKETING:'📱', DEVIL:'😈' };

window.addEventListener('load', () => {
  tick(); setInterval(tick, 1000);
});

function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

async function startAnalysis() {
  const input = document.getElementById('textField').value.trim();
  if (!input) { toast('入力してください','err'); return; }

  addMsg('user', '👤', 'YOU', input, '#c9a227');
  
  // 5人のアイコンを思考中(チカチカ)にする
  AGENT_KEYS.forEach(k => setState(k,'thinking'));
  setLoading(true);
  document.getElementById('execBtn').disabled = true;

  try {
    const response = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({ userInput: input }),
        redirect: "follow"
    });
    const result = await response.json();
    if (result.status === "success") onSuccess(result.data);
    else throw new Error(result.message);
  } catch (err) { onErr(err); }
}

function onSuccess(aiText) {
  setLoading(false);
  document.getElementById('execBtn').disabled = false;
  AGENT_KEYS.forEach(k => setState(k,'idle'));

  // AIのテキストから各参謀のセリフを正確に切り抜く「正規表現」の魔法
  const lookahead = "(?=\\[秘書\\]|\\[営業部長\\]|\\[プランナー\\]|\\[マーケ.*?担当\\]|\\[デビル\\]|$)";
  const regexMap = {
      SECRETARY: new RegExp(`\\[秘書\\]:?\\s*([\\s\\S]*?)${lookahead}`, 'i'),
      SALES:     new RegExp(`\\[営業部長\\]:?\\s*([\\s\\S]*?)${lookahead}`, 'i'),
      PLANNER:   new RegExp(`\\[プランナー\\]:?\\s*([\\s\\S]*?)${lookahead}`, 'i'),
      MARKETING: new RegExp(`\\[マーケ.*?担当\\]:?\\s*([\\s\\S]*?)${lookahead}`, 'i'),
      DEVIL:     new RegExp(`\\[デビル\\]:?\\s*([\\s\\S]*?)${lookahead}`, 'i')
  };

  AGENT_KEYS.forEach((k, i) => {
    setTimeout(() => {
      setState(k, 'active');
      const match = aiText.match(regexMap[k]);
      
      // 発言が見つかった場合はそれを表示。見つからなければフォールバック
      const text = match ? match[1].trim() : (aiText.length > 0 && k === 'SECRETARY' ? aiText : "");
      
      if (text) {
          addMsg(k.toLowerCase(), AGENT_EMOJI[k], AGENT_LABELS[k], text, AGENT_COLORS[k]);
      }
      setTimeout(() => setState(k,'idle'), 3000);
    }, i * 1200);
  });
  
  toast('✓ 分析完了', 'ok');
  document.getElementById('textField').value = "";
}

function onErr(e) {
  setLoading(false);
  document.getElementById('execBtn').disabled = false;
  AGENT_KEYS.forEach(k => setState(k,'idle'));
  toast('エラー: ' + e.message, 'err');
}

function setState(key, state) {
  const el = document.getElementById('slot-'+key);
  if (!el) return;
  el.classList.remove('active','thinking');
  if (state === 'active')   el.classList.add('active');
  if (state === 'thinking') el.classList.add('thinking');
}

function addMsg(cls, emoji, name, text, color) {
  document.getElementById('chatEmpty').style.display = 'none';
  const log = document.getElementById('chatLog');
  const div = document.createElement('div');
  div.className = `chat-msg a-${cls}`;
  div.innerHTML = `<div class="msg-avatar a-${cls}">${emoji}</div><div class="msg-body"><div class="msg-meta"><span class="msg-name" style="color:${color}">${name}</span></div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div></div>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function setLoading(on) { document.getElementById('loadVeil').classList.toggle('on', on); }
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast '+type+' show';
  setTimeout(() => el.classList.remove('show'), 4000);
}
</script>
</body>
</html>
