<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHONAN CENTRAL BEACON | BOARDROOM</title>
  <script>
  if (window.self !== window.top) { window.top.location.href = window.location.href; }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,300&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #070d1a; --bg2: #0d1829; --gold: #c9a227; --gold-lt: #f0d060;
    --cyan: #00f2ff; --navy: #1a2a5e; --text: #e2e8f0; --muted: #4a5568;
    --card: rgba(255,255,255,0.032); --border: rgba(201,162,39,0.18);
    --secretary: #3b82f6; --manager: #22c55e; --planner: #c9a227;
    --sns: #a855f7; --devil: #ef4444; --advisor: #94a3b8;
    --text-dim: rgba(226,232,240,0.6);
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }
  body { font-family: 'Montserrat', 'Noto Sans JP', sans-serif; color: var(--text); display: flex; flex-direction: column; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(0,200,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,.035) 1px, transparent 1px);
    background-size: 44px 44px;
  }
  body::after {
    content: ''; position: fixed; bottom: 0; left: 0; right: 0; height: 35vh;
    background: radial-gradient(ellipse at 50% 110%, rgba(0,90,200,.14) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }
  .z1 { position: relative; z-index: 1; }

  /* ── ヘッダー ── */
  .hdr { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px 10px; border-bottom: 1px solid var(--border); }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { font-size: 26px; }
  .logo-name { font-size: 15px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(120deg, #a37a15, var(--gold), var(--gold-lt), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200%; animation: gold-shift 4s linear infinite; }
  @keyframes gold-shift { 0%{background-position:0%} 100%{background-position:200%} }
  .logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }
  .hdr-right { display: flex; align-items: center; gap: 16px; }
  .sys-badge { font-size: 10px; letter-spacing: 1.5px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 6px var(--cyan); animation: dot-blink 2s ease-in-out infinite; }
  @keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:.15} }
  .clock { font-size: 18px; font-weight: 200; letter-spacing: 2px; color: var(--text); }

  /* ── エージェントバー ── */
  .agent-bar { flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 0; padding: 24px 24px 10px; border-bottom: 1px solid var(--border); }
  .agent-slot { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 6px 20px; cursor: pointer; transition: transform .35s ease; }
  .agent-slot:hover { transform: translateY(-2px); }
  .portrait-wrap {
    width: 85px; height: 85px; border-radius: 50%;
    border: 2px solid var(--border); overflow: hidden;
    position: relative; transition: all .5s ease;
    background: var(--bg2);
    display: flex; align-items: center; justify-content: center;
  }
  .portrait-emoji { font-size: 34px; line-height: 1; transition: opacity .4s; }
  .agent-sprite { position: absolute; width: 650%; height: auto; pointer-events: none; }
  .agent-slot .portrait-wrap { filter: grayscale(85%); opacity: .4; }
  .agent-slot.active .portrait-wrap { filter: grayscale(0%); opacity: 1; border-color: var(--cyan); box-shadow: 0 0 22px var(--cyan), 0 0 50px rgba(0,242,255,.28); transform: scale(1.07); }
  .agent-slot.thinking .portrait-wrap { filter: grayscale(40%); opacity: .75; border-color: var(--gold); animation: think-glow 1s ease-in-out infinite; }
  @keyframes think-glow { 0%,100% { box-shadow: 0 0 12px rgba(201,162,39,.5); } 50% { box-shadow: 0 0 28px rgba(201,162,39,.9), 0 0 48px rgba(201,162,39,.25); } }
  .agent-id { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); transition: color .3s; }
  .agent-slot.active .agent-id { color: var(--cyan); }
  .agent-slot.thinking .agent-id { color: var(--gold); }
  .agent-role { font-size: 8px; letter-spacing: .5px; color: rgba(255,255,255,.2); }
  .bar-divider { width: 1px; height: 60px; flex-shrink: 0; background: linear-gradient(to bottom, transparent, var(--border), transparent); }

  /* ── ボディグリッド ── */
  .body-grid { flex: 1; display: grid; grid-template-columns: 1fr; gap: 0; padding: 12px 24px 0; min-height: 0; overflow: hidden; }
  .chat-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .chat-hdr { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .chat-hdr-lbl { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; color: var(--gold); }

  /* ── ミッションバナー ── */
  .mission-banner { flex-shrink: 0; display: none; align-items: center; gap: 12px; padding: 8px 14px; border-bottom: 1px solid var(--border); background: rgba(201,162,39,.06); }
  .mission-banner.show { display: flex; }
  .mission-banner-lbl { font-size: 8px; font-weight: 700; letter-spacing: 2px; color: var(--gold); white-space: nowrap; }
  .mission-banner-text { font-size: 11px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; line-height: 1.5; }

  /* ── カラムグリッド ── */
  .chat-log { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .agent-cols { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 8px; min-height: 0; overflow: hidden; }

  /* ── 各エージェント列 ── */
  .agent-col { display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,.07); border-radius: 10px; background: rgba(255,255,255,.02); }
  .agent-col-hdr { padding: 8px 10px; display: flex; align-items: center; gap: 7px; border-bottom: 1px solid rgba(255,255,255,.07); flex-shrink: 0; }
  .col-hdr-emoji { font-size: 13px; flex-shrink: 0; }
  .col-hdr-name { font-size: 9px; font-weight: 700; letter-spacing: 1px; }
  .col-hdr-role { font-size: 7px; opacity: .35; letter-spacing: .5px; margin-top: 1px; }
  .agent-col-body { flex: 1; overflow-y: auto; padding: 7px; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
  .agent-col-body::-webkit-scrollbar { width: 2px; }
  .agent-col-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

  /* ── カラムメッセージカード ── */
  .col-msg {
    background: rgba(255,255,255,.04); border-radius: 8px; padding: 8px 10px;
    font-size: 11px; line-height: 1.72; font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300; border-left: 2px solid; white-space: pre-wrap; word-break: break-word;
    animation: msg-drop .4s ease both;
    cursor: pointer; transition: background .2s, transform .15s;
  }
  .col-msg:hover { background: rgba(255,255,255,.09); transform: translateY(-1px); }
  .col-msg-ts { font-size: 7.5px; opacity: .35; margin-bottom: 3px; letter-spacing: .5px; }
  .col-msg-expand-hint { font-size: 7.5px; opacity: 0; color: var(--cyan); margin-top: 4px; letter-spacing: .5px; transition: opacity .2s; }
  .col-msg:hover .col-msg-expand-hint { opacity: .7; }
  @keyframes msg-drop { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  /* per-agent colors */
  .col-secretary .agent-col-hdr   { border-top: 2px solid var(--secretary); }
  .col-secretary .col-hdr-name    { color: var(--secretary); }
  .col-secretary .col-msg         { border-color: var(--secretary); }
  .col-manager .agent-col-hdr     { border-top: 2px solid var(--manager); }
  .col-manager .col-hdr-name      { color: var(--manager); }
  .col-manager .col-msg           { border-color: var(--manager); }
  .col-planner .agent-col-hdr     { border-top: 2px solid var(--planner); }
  .col-planner .col-hdr-name      { color: var(--planner); }
  .col-planner .col-msg           { border-color: var(--planner); }
  .col-sns .agent-col-hdr         { border-top: 2px solid var(--sns); }
  .col-sns .col-hdr-name          { color: var(--sns); }
  .col-sns .col-msg               { border-color: var(--sns); }
  .col-devil .agent-col-hdr       { border-top: 2px solid var(--devil); }
  .col-devil .col-hdr-name        { color: var(--devil); }
  .col-devil .col-msg             { border-color: var(--devil); }
  .col-advisor .agent-col-hdr     { border-top: 2px solid var(--advisor); }
  .col-advisor .col-hdr-name      { color: var(--advisor); }
  .col-advisor .col-msg           { border-color: var(--advisor); }
  .col-interrogation .agent-col-hdr { border-top: 2px solid var(--cyan); background: rgba(0,242,255,.04); }
  .col-interrogation .col-hdr-name  { color: var(--cyan); }
  .col-interrogation .col-msg       { border-color: var(--cyan); }

  /* ── 空状態 ── */
  .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--muted); padding: 40px; text-align: center; }
  .empty-icon { font-size: 38px; opacity: .3; }
  .empty-lbl { font-size: 11px; letter-spacing: 1.2px; line-height: 1.9; }
  .col-placeholder { font-size: 10px; color: var(--muted); line-height: 1.8; letter-spacing: .3px; padding: 4px 2px; }

  /* ── フッター入力 ── */
  .input-footer { flex-shrink: 0; padding: 10px 24px 14px; border-top: 1px solid var(--border); }
  .input-top-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .mission-lbl { font-size: 9px; letter-spacing: 2px; color: var(--cyan); white-space: nowrap; font-weight: bold; }
  .mission-sel { background: rgba(0,242,255,.05); border: 1px solid rgba(0,242,255,.3); border-radius: 6px; color: var(--cyan); padding: 5px 10px; font-size: 11px; font-weight: bold; font-family: inherit; outline: none; cursor: pointer; transition: all .3s; }
  .mission-sel:hover { background: rgba(0,242,255,.1); box-shadow: 0 0 10px rgba(0,242,255,.2); }
  .mode-pills { display: flex; gap: 5px; margin-left: auto; }
  .pill { padding: 5px 13px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: 1px; cursor: pointer; }
  .pill.on { border-color: var(--gold); color: var(--gold); background: rgba(201,162,39,.09); }
  .input-main { display: flex; gap: 10px; align-items: flex-end; }
  .text-field { flex: 1; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 12px; padding: 11px 15px; color: var(--text); font-size: 14px; outline: none; resize: none; line-height: 1.55; font-family: 'Noto Sans JP', sans-serif; font-weight: 300; min-height: 44px; max-height: 110px; }
  .exec-btn { width: 110px; height: 44px; border: none; border-radius: 12px; background: linear-gradient(135deg, #8a6210, var(--gold), var(--gold-lt), var(--gold)); background-size: 300%; background-position: 0%; color: #050505; font-size: 11px; font-weight: 900; letter-spacing: 2.5px; cursor: pointer; flex-shrink: 0; transition: all .35s; }
  .exec-btn:hover { background-position: 100%; box-shadow: 0 4px 24px rgba(201,162,39,.55); transform: translateY(-1px); }
  .exec-btn:disabled { background: #1e2a3a; color: var(--muted); cursor: not-allowed; }

  /* ── 壁打ちボタン ── */
  .walluchi-trigger {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 14px; border: 1px solid rgba(255,255,255,.2);
    border-radius: 20px; background: rgba(255,255,255,.05);
    color: var(--text); font-size: 10px; font-weight: 700;
    letter-spacing: 1px; cursor: pointer; transition: all .25s;
    white-space: nowrap;
  }
  .walluchi-trigger:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.4); }

  /* ── 壁打ちモーダル ── */
  .wl-overlay {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: rgba(4,9,18,.82); backdrop-filter: blur(12px);
    align-items: center; justify-content: center;
  }
  .wl-overlay.open { display: flex; }
  .wl-modal {
    width: 80vw; height: 84vh;
    background: linear-gradient(160deg, #0b1424 0%, #07101f 100%);
    border: 1px solid rgba(0,242,255,.22);
    border-radius: 20px; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 0 80px rgba(0,242,255,.08), 0 0 0 1px rgba(255,255,255,.04), 0 24px 80px rgba(0,0,0,.7);
    animation: wl-pop .3s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes wl-pop { from{opacity:0;transform:scale(.93)} to{opacity:1;transform:scale(1)} }
  .wl-hdr {
    flex-shrink: 0; padding: 14px 20px 12px;
    border-bottom: 1px solid rgba(0,242,255,.12);
    display: flex; align-items: center; gap: 16px;
    background: rgba(0,242,255,.03);
  }
  .wl-hdr-label { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .wl-hdr-title { font-size: 11px; font-weight: 900; letter-spacing: 3px; color: var(--cyan); }
  .wl-hdr-sub { font-size: 8px; color: var(--muted); letter-spacing: 2px; }
  .wl-agent-chips { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
  .wl-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.04); cursor: pointer;
    font-size: 10px; font-weight: 700; letter-spacing: .8px; color: var(--muted);
    transition: all .2s;
  }
  .wl-chip:hover { border-color: rgba(255,255,255,.25); color: var(--text); }
  .wl-chip.selected { color: #000; font-weight: 900; }
  .wl-chip-emoji { font-size: 13px; }
  .wl-close {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05);
    color: var(--muted); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; flex-shrink: 0;
  }
  .wl-close:hover { border-color: var(--devil); color: var(--devil); background: rgba(239,68,68,.1); }
  .wl-log {
    flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  .wl-log::-webkit-scrollbar { width: 3px; }
  .wl-log::-webkit-scrollbar-thumb { background: rgba(0,242,255,.2); border-radius: 2px; }
  .wl-empty {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; color: var(--muted); text-align: center;
  }
  .wl-empty-icon { font-size: 44px; opacity: .2; }
  .wl-empty-lbl { font-size: 11px; letter-spacing: 1px; line-height: 1.9; }
  .wl-msg { display: flex; gap: 12px; align-items: flex-start; animation: msg-drop .35s ease both; max-width: 86%; }
  .wl-msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .wl-msg-avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; border: 1px solid; background: var(--bg2);
  }
  .wl-msg-body { display: flex; flex-direction: column; gap: 4px; }
  .wl-msg-name { font-size: 9px; font-weight: 700; letter-spacing: 1px; }
  .wl-msg.user .wl-msg-name { text-align: right; color: var(--gold); }
  .wl-msg-bubble {
    font-size: 13px; line-height: 1.82; padding: 12px 16px;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 300;
    white-space: pre-wrap; word-break: break-word;
    border-radius: 4px 16px 16px 16px;
    background: rgba(255,255,255,.05); border-left: 3px solid;
  }
  .wl-msg.user .wl-msg-bubble {
    border-radius: 16px 4px 16px 16px; border-left: none;
    border-right: 3px solid var(--gold); background: rgba(201,162,39,.08);
    color: var(--text);
  }
  .wl-footer {
    flex-shrink: 0; padding: 14px 20px 16px;
    border-top: 1px solid rgba(0,242,255,.1);
    background: rgba(0,242,255,.02);
    display: flex; gap: 12px; align-items: flex-end;
  }
  .wl-footer-left { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .wl-agent-indicator {
    font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
    display: flex; align-items: center; gap: 6px;
  }
  .wl-agent-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .wl-textarea {
    width: 100%; background: rgba(255,255,255,.05);
    border: 1px solid rgba(0,242,255,.2); border-radius: 12px;
    padding: 12px 16px; color: var(--text); font-size: 13px;
    outline: none; resize: none; line-height: 1.65;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 300;
    min-height: 110px; max-height: 220px;
    transition: border-color .2s;
  }
  .wl-textarea:focus { border-color: rgba(0,242,255,.5); box-shadow: 0 0 0 2px rgba(0,242,255,.08); }
  .wl-textarea::placeholder { color: var(--muted); }
  .wl-send {
    width: 120px; align-self: flex-end; height: 50px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #006a80, #00c8e0, #00f2ff, #00c8e0);
    background-size: 300%; background-position: 0%;
    color: #030d14; font-size: 11px; font-weight: 900; letter-spacing: 2.5px;
    cursor: pointer; flex-shrink: 0; transition: all .3s;
  }
  .wl-send:hover { background-position: 100%; box-shadow: 0 4px 24px rgba(0,242,255,.5); transform: translateY(-1px); }
  .wl-send:disabled { background: #1e2a3a; color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }
  .wl-shortcut-hint { font-size: 8px; color: var(--muted); text-align: right; letter-spacing: .5px; margin-top: 2px; }
  .wl-thinking { display: flex; align-items: center; gap: 8px; padding: 10px 16px; font-size: 11px; color: var(--muted); font-style: italic; }
  .wl-thinking-dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--cyan); animation: dot-blink 1.2s ease-in-out infinite; }
  .wl-thinking-dots span:nth-child(2) { animation-delay: .2s; }
  .wl-thinking-dots span:nth-child(3) { animation-delay: .4s; }

  /* ── コメント拡大モーダル ── */
  .expand-overlay {
    display: none; position: fixed; inset: 0; z-index: 600;
    background: rgba(4,9,18,.78); backdrop-filter: blur(10px);
    align-items: center; justify-content: center;
  }
  .expand-overlay.open { display: flex; }
  .expand-modal {
    width: min(64vw, 900px); max-height: 75vh;
    background: linear-gradient(160deg, #0c1628 0%, #07101f 100%);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 18px; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,.7);
    animation: wl-pop .25s cubic-bezier(.34,1.56,.64,1);
  }
  .expand-hdr {
    flex-shrink: 0; padding: 14px 18px 12px;
    border-bottom: 1px solid rgba(255,255,255,.07);
    display: flex; align-items: center; justify-content: space-between;
  }
  .expand-hdr-left { display: flex; align-items: center; gap: 10px; }
  .expand-agent-tag { font-size: 10px; font-weight: 900; letter-spacing: 2px; }
  .expand-ts { font-size: 9px; color: var(--muted); }
  .expand-wl-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 12px; border: 1px solid rgba(0,242,255,.3);
    border-radius: 14px; background: rgba(0,242,255,.07);
    color: var(--cyan); font-size: 9px; font-weight: 700;
    letter-spacing: 1px; cursor: pointer; transition: all .2s; margin-right: 8px;
  }
  .expand-wl-btn:hover { background: rgba(0,242,255,.18); }
  .expand-hdr-right { display: flex; align-items: center; gap: 8px; }
  .expand-body {
    flex: 1; overflow-y: auto; padding: 20px 22px;
    font-size: 14px; line-height: 1.9;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 300;
    white-space: pre-wrap; word-break: break-word;
    border-left: 3px solid transparent;
  }
  .expand-body::-webkit-scrollbar { width: 3px; }
  .expand-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); }

  /* ── ローディング & トースト ── */
  .loading-veil { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(7,13,26,.92); backdrop-filter: blur(10px); flex-direction: column; align-items: center; justify-content: center; gap: 22px; }
  .loading-veil.on { display: flex; }
  .radar { width: 80px; height: 80px; position: relative; }
  .r-ring { position: absolute; inset: 0; border-radius: 50%; border: 1px solid var(--cyan); opacity: 0; animation: r-expand 2s ease-out infinite; }
  .r-ring:nth-child(2){animation-delay:.6s} .r-ring:nth-child(3){animation-delay:1.2s}
  @keyframes r-expand { 0%{transform:scale(.2);opacity:.9} 100%{transform:scale(2.5);opacity:0} }
  .r-core { position: absolute; inset: 36%; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 18px var(--cyan), 0 0 40px rgba(0,242,255,.4); }
  .l-title { font-size: 13px; font-weight: 700; letter-spacing: 3px; color: rgba(255,255,255,.9); }
  .toast { position: fixed; top: 24px; right: 24px; background: rgba(7,13,26,.96); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; font-weight: 600; color: var(--text); box-shadow: 0 8px 28px rgba(0,0,0,.4); transform: translateX(120%); transition: transform .4s cubic-bezier(.34,1.56,.64,1); z-index: 700; }
  .toast.show { transform: translateX(0); }
  .toast.ok { border-color: var(--manager); }
  .toast.err { border-color: var(--devil); }
