<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHONAN BEACON | FIELD TERMINAL</title>
    <style>
        body { background: #0a101d; color: #00f2ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        textarea { width: 90%; height: 100px; background: #1a2533; border: 1px solid #00f2ff; color: #fff; border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 16px; }
        #executeBtn { width: 90%; padding: 15px; background: #00f2ff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        #executeBtn:disabled { background: #444; color: #888; }
        #loader { display: none; margin: 20px; color: #00f2ff; font-style: italic; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        #output { text-align: left; background: rgba(0,242,255,0.05); padding: 20px; border-radius: 10px; line-height: 1.6; white-space: pre-wrap; margin-top: 20px; }
    </style>
</head>
<body>
    <h2 style="letter-spacing: 2px;">SHONAN CENTRAL BEACON</h2>
    <textarea id="userInput" placeholder="4月の戦略を考えて / CMO、集客について教えて"></textarea>
    <button id="executeBtn" onclick="runAnalysis()">EXECUTE MISSION</button>
    <div id="loader">マザー脳と通信中（AIが思考・入力中）...</div>
    <div id="output"></div>

    <script>
        // 【重要】もし先ほどGASで「新しいデプロイ」をしてURLが変わっていたら、ここに新しいURLを貼ってください。
        // （同じURLのままであれば、このままで大丈夫です）
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwzc5e6bsf6OBRgwzRPkh3L-BQM-ghF_pJOYEicHKTqNWGSHldkmpvdELJLnoAhhzwt2A/exec";

        async function runAnalysis() {
            const input = document.getElementById('userInput').value;
            if (!input) return;

            const btn = document.getElementById('executeBtn');
            const loader = document.getElementById('loader');
            const output = document.getElementById('output');

            btn.disabled = true;
            loader.style.display = 'block';
            output.innerText = "受信待機中...";

            try {
                // タイムアウト設定（90秒）
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 90000);

                // ★魔法の通信設定（CORSの壁を抜け、リダイレクトを追跡する）
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ userInput: input }),
                    redirect: "follow", // GASのリダイレクト仕様に必須
                    signal: controller.signal
                });

                // タイムアウト解除
                clearTimeout(timeoutId);

                // AIからの返事をしっかり受け取って解読する
                const result = await response.json();

                if (result.status === "success") {
                    output.innerText = result.data; // 画面にAIの回答をドバッと表示！
                } else {
                    output.innerText = "マザー脳内部エラー: " + result.message;
                }

            } catch (err) {
                // 通信エラーやタイムアウト時の表示
                output.innerText = "通信エラー: " + err.message + "\n※GASのURLが最新のものか確認してください。";
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
