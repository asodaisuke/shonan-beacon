<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHONAN CENTRAL BEACON | BOARDROOM</title>
  <script>
    if (window.self !== window.top) { window.top.location.href = window.location.href; }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,300&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070d1a; --bg2: #0d1829; --gold: #c9a227; --gold-lt: #f0d060;
      --cyan: #00f2ff; --navy: #1a2a5e; --text: #e2e8f0; --muted: #4a5568;
      --card: rgba(255,255,255,0.032); --border: rgba(201,162,39,0.18);
      --secretary: #3b82f6; --sales: #22c55e; --planner: #c9a227;
      --marketing: #a855f7; --devil: #ef4444; --advisor: #94a3b8;
      --text-dim: rgba(226, 232, 240, 0.6);
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: 'Montserrat', 'Noto Sans JP', sans-serif; color: var(--text); display: flex; flex-direction: column; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(0,200,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,.035) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    .z1 { position: relative; z-index: 1; }

    /* ── ヘッダー ── */
    .hdr { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px 10px; border-bottom: 1px solid var(--border); }
    .logo-name { font-size: 15px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(120deg, #a37a15, var(--gold), var(--gold-lt), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200%; animation: gold-shift 4s linear infinite; }
    @keyframes gold-shift { 0%{background-position:0%} 100%{background-position:200%} }
    .clock { font-size: 18px; font-weight: 200; letter-spacing: 2px; color: var(--text); }

    /* ── エージェントバー ── */
    .agent-bar { flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 0; padding: 12px 24px 10px; border-bottom: 1px solid var(--border); }
    .agent-slot { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 6px 20px; cursor: pointer; transition: transform .35s ease; }
    .portrait-wrap { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border); overflow: hidden; position: relative; background: var(--bg2) center/500% no-repeat; display: flex; align-items: center; justify-content: center; }
    .portrait-emoji { font-size: 32px; }
    .agent-id { font-size: 10px; font-weight: 700; color: var(--muted); }
    .agent-slot.active .agent-id { color: var(--cyan); }
    .agent-slot.active .portrait-wrap { border-color: var(--cyan); box-shadow: 0 0 20px var(--cyan); }
    .agent-slot.thinking .portrait-wrap { animation: think-glow 1s ease-in-out infinite; }
    @keyframes think-glow { 0%,100% { box-shadow: 0 0 10px rgba(201,162,39,.5); } 50% { box-shadow: 0 0 25px rgba(201,162,39,.9); } }
    .bar-divider { width: 1px; height: 50px; background: var(--border); }

    /* ── 戦略モード・セレクター ── */
    .strategy-mode-container { position: relative; z-index: 100; display: flex; flex-direction: column; gap: 8px; padding: 12px 14px; background: rgba(201,162,39,0.05); border-bottom: 1px solid var(--border); }
    .mode-tabs { display: flex; gap: 8px; }
    .mode-tab { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-dim); padding: 6px 14px; font-size: 10px; font-weight: 700; cursor: pointer; border-radius: 4px; transition: all 0.3s; }
    .mode-tab.active { background: rgba(201, 162, 39, 0.2); border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px rgba(201, 162, 39, 0.3); }
    .mode-desc { font-size: 10px; color: var(--text-dim); margin: 0; opacity: 0.8; }

    /* ── メイングリッド（7列設定） ── */
    .body-grid { flex: 1; display: grid; grid-template-columns: 1fr; padding: 12px 24px 0; overflow: hidden; }
    .chat-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
    .agent-cols { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 8px; overflow: hidden; }
    .agent-col { display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,.07); border-radius: 10px; background: rgba(255,255,255,.02); }
    .agent-col-hdr { padding: 8px; border-bottom: 1px solid rgba(255,255,255,.07); display: flex; align-items: center; gap: 6px; }
    .col-hdr-name { font-size: 9px; font-weight: 700; }
    .agent-col-body { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 6px; }
    
    .col-msg { background: rgba(255,255,255,.04); border-radius: 8px; padding: 8px; font-size: 11px; line-height: 1.6; border-left: 2px solid; cursor: pointer; }
    
    /* エージェント別カラー */
    .col-secretary .agent-col-hdr { border-top: 2px solid var(--secretary); } .col-secretary .col-msg { border-color: var(--secretary); }
    .col-sales .agent-col-hdr { border-top: 2px solid var(--sales); } .col-sales .col-msg { border-color: var(--sales); }
    .col-planner .agent-col-hdr { border-top: 2px solid var(--planner); } .col-planner .col-msg { border-color: var(--planner); }
    .col-marketing .agent-col-hdr { border-top: 2px solid var(--marketing); } .col-marketing .col-msg { border-color: var(--marketing); }
    .col-devil .agent-col-hdr { border-top: 2px solid var(--devil); } .col-devil .col-msg { border-color: var(--devil); }
    .col-advisor .agent-col-hdr { border-top: 2px solid var(--advisor); } .col-advisor .col-msg { border-color: var(--advisor); }
    .col-interrogation .agent-col-hdr { border-top: 2px solid var(--cyan); } .col-interrogation .col-msg { border-color: var(--cyan); }

    /* ── フッター入力 ── */
    .input-footer { padding: 14px 24px; border-top: 1px solid var(--border); }
    .input-main { display: flex; gap: 10px; }
    .text-field { flex: 1; background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); outline: none; resize: none; min-height: 44px; }
    .exec-btn { width: 120px; background: var(--gold); border: none; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; }
    .exec-btn:hover { background: var(--gold-lt); box-shadow: 0 0 20px rgba(201,162,39,0.4); }

    /* 共通・演出 */
    .mission-banner { display: none; padding: 8px 14px; background: rgba(201,162,39,0.1); border-bottom: 1px solid var(--border); font-size: 11px; }
    .mission-banner.show { display: flex; align-items: center; gap: 10px; }
    .loading-veil { display: none; position: fixed; inset: 0; background: rgba(7,13,26,0.9); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
    .loading-veil.on { display: flex; }
    .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; background: #1a2a5e; border: 1px solid var(--cyan); transform: translateX(150%); transition: 0.4s; z-index: 2000; }
    .toast.show { transform: translateX(0); }
  </style>
</head>
<body>

<header class="hdr z1">
  <div class="logo">
    <div class="logo-name">SHONAN CENTRAL BEACON</div>
    <div style="font-size: 9px; color: var(--muted); letter-spacing: 1px;">STRATEGIC BOARDROOM | PCDEPOT 湘南エリア</div>
  </div>
  <div class="clock" id="clock">--:--</div>
</header>

<div class="agent-bar z1">
  <div class="agent-slot" id="slot-SECRETARY"><div class="portrait-wrap"><span class="portrait-emoji">📋</span></div><div class="agent-id">秘書</div></div>
  <div class="bar-divider"></div>
  <div class="agent-slot" id="slot-SALES"><div class="portrait-wrap"><span class="portrait-emoji">📈</span></div><div class="agent-id">営業部長</div></div>
  <div class="bar-divider"></div>
  <div class="agent-slot" id="slot-PLANNER"><div class="portrait-wrap"><span class="portrait-emoji">💡</span></div><div class="agent-id">プランナー</div></div>
  <div class="bar-divider"></div>
  <div class="agent-slot" id="slot-MARKETING"><div class="portrait-wrap"><span class="portrait-emoji">📱</span></div><div class="agent-id">マーケSNS</div></div>
  <div class="bar-divider"></div>
  <div class="agent-slot" id="slot-DEVIL"><div class="portrait-wrap"><span class="portrait-emoji">😈</span></div><div class="agent-id">デビル</div></div>
  <div class="bar-divider"></div>
  <div class="agent-slot" id="slot-ADVISOR"><div class="portrait-wrap"><span class="portrait-emoji">👴</span></div><div class="agent-id">齋藤相談役</div></div>
</div>

<div class="body-grid z1">
  <div class="chat-wrap">
    <div class="mission-banner" id="missionBanner">
      <b style="color:var(--gold)">MISSION:</b> <span id="missionText"></span>
    </div>
    
    <div class="strategy-mode-container">
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="setStrategyMode(this, 'CHATTING')">💬 通常対話</button>
        <button class="mode-tab" onclick="setStrategyMode(this, 'MORNING')">☀️ モーニング</button>
        <button class="mode-tab" onclick="setStrategyMode(this, 'WAR_ROOM')">🌙 深夜討議</button>
        <button class="mode-tab" onclick="setStrategyMode(this, 'ON_DEMAND')">🔥 オンデマンド</button>
      </div>
      <p id="mode-description" class="mode-desc">参謀たちと自由にチャット形式で議論します。</p>
    </div>

    <div class="agent-cols" id="agentCols">
      <div class="agent-col col-secretary"><div class="agent-col-hdr">📋 秘書</div><div class="agent-col-body" id="colbody-SECRETARY"></div></div>
      <div class="agent-col col-sales"><div class="agent-col-hdr">📈 営業部長</div><div class="agent-col-body" id="colbody-SALES"></div></div>
      <div class="agent-col col-planner"><div class="agent-col-hdr">💡 プランナー</div><div class="agent-col-body" id="colbody-PLANNER"></div></div>
      <div class="agent-col col-marketing"><div class="agent-col-hdr">📱 マーケSNS</div><div class="agent-col-body" id="colbody-MARKETING"></div></div>
      <div class="agent-col col-devil"><div class="agent-col-hdr">😈 デビル</div><div class="agent-col-body" id="colbody-DEVIL"></div></div>
      <div class="agent-col col-advisor"><div class="agent-col-hdr">👴 齋藤相談役</div><div class="agent-col-body" id="colbody-ADVISOR"></div></div>
      <div class="agent-col col-interrogation"><div class="agent-col-hdr">▸ INTERROGATION</div><div class="agent-col-body" id="colbody-INTERROGATION"></div></div>
    </div>
  </div>
</div>

<div class="input-footer z1">
  <div class="input-main">
    <textarea id="textField" class="text-field" placeholder="経営課題を入力してください..."></textarea>
    <button class="exec-btn" id="execBtn" onclick="startAnalysis()">EXECUTE</button>
  </div>
</div>

<div class="loading-veil" id="loadVeil"><div class="logo-name">ANALYZING...</div></div>
<div class="toast" id="toast"></div>

<script>
  const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzKBCWxdwhsW4mSA0V1e3BNOsmreIc4D1n-wsPBvnmGvhe71Pz1XOdO7_EUDA-GYosuQA/exec';
  
  let currentMode = 'CHATTING';
  const AGENT_KEYS   = ['SECRETARY', 'SALES', 'PLANNER', 'MARKETING', 'DEVIL', 'ADVISOR'];
  const AGENT_LABELS = { SECRETARY:'秘書', SALES:'営業部長', PLANNER:'プランナー', MARKETING:'マーケ・SNS', DEVIL:'デビル', ADVISOR:'齋藤相談役' };
  
  const AGENT_REGEX  = {
    SECRETARY: /\[秘書\]:?\s*([\s\S]*?)(?=\[営業部長\]|\[プランナー\]|\[マーケ|\[デビル\]|\[齋藤相談役\]|$)/i,
    SALES:     /\[営業部長\]:?\s*([\s\S]*?)(?=\[秘書\]|\[プランナー\]|\[マーケ|\[デビル\]|\[齋藤相談役\]|$)/i,
    PLANNER:   /\[プランナー\]:?\s*([\s\S]*?)(?=\[秘書\]|\[営業部長\]|\[マーケ|\[デビル\]|\[齋藤相談役\]|$)/i,
    MARKETING: /\[マーケ.*?担当\]:?\s*([\s\S]*?)(?=\[秘書\]|\[営業部長\]|\[プランナー\]|\[デビル\]|\[齋藤相談役\]|$)/i,
    DEVIL:     /\[デビル\]:?\s*([\s\S]*?)(?=\[秘書\]|\[営業部長\]|\[プランナー\]|\[マーケ|\[齋藤相談役\]|$)/i,
    ADVISOR:   /\[(?:齋藤相談役|ADVISOR)\]:?\s*([\s\S]*?)(?=\[秘書\]|\[営業部長\]|\[プランナー\]|\[マーケ|\[デビル\]|$)/i
  };

  function tick() {
    const n = new Date();
    document.getElementById('clock').textContent = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  }
  setInterval(tick, 1000); tick();

  function setStrategyMode(el, mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
    el.classList.add('active');
    const desc = document.getElementById('mode-description');
    const descriptions = {
      'CHATTING': '参謀たちと自由にチャット形式で議論します。',
      'MORNING': '本日の朝礼に最適な3つの要点をブリーフィングします。',
      'WAR_ROOM': '深夜に行われた参謀たちの議論ログと答申書を読み込みます。',
      'ON_DEMAND': '入力したテーマについて、6人がその場で徹底討論を開始します。'
    };
    desc.innerText = descriptions[mode];
  }

  async function startAnalysis() {
    const input = document.getElementById('textField').value.trim();
    if (currentMode !== 'MORNING' && !input) { toast('課題を入力してください', 'err'); return; }

    document.getElementById('missionBanner').classList.add('show');
    document.getElementById('missionText').textContent = currentMode === 'MORNING' ? '☀️ モーニング実行中' : input;
    
    AGENT_KEYS.forEach(k => document.getElementById('slot-' + k).classList.add('thinking'));
    document.getElementById('loadVeil').classList.add('on');

    try {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify({ mode: currentMode, userInput: input })
      });
      const result = await res.json();
      if (result.status === 'success') {
        renderResult(result.data);
      } else { throw new Error(result.message); }
    } catch (err) { toast('エラー発生', 'err'); }
    
    document.getElementById('loadVeil').classList.remove('on');
    AGENT_KEYS.forEach(k => document.getElementById('slot-' + k).classList.remove('thinking'));
  }

  function renderResult(aiText) {
    AGENT_KEYS.forEach((k, i) => {
      setTimeout(() => {
        const match = aiText.match(AGENT_REGEX[k]);
        const text = match ? match[1].trim() : (i === 0 ? aiText : "");
        if (text) {
          const body = document.getElementById('colbody-' + k);
          const div = document.createElement('div');
          div.className = 'col-msg';
          div.innerText = text;
          body.appendChild(div);
          body.scrollTop = body.scrollHeight;
        }
      }, i * 800);
    });
  }

  function toast(msg, type) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
