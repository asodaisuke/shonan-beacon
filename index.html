<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHONAN CENTRAL BEACON | BOARDROOM</title>
  <script>
    if (window.self !== window.top) { window.top.location.href = window.location.href; }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,300&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* ── v5.5マスター・スタイルを完全継承 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070d1a; --bg2: #0d1829; --gold: #c9a227; --gold-lt: #f0d060;
      --cyan: #00f2ff; --navy: #1a2a5e; --text: #e2e8f0; --muted: #4a5568;
      --card: rgba(255,255,255,0.032); --border: rgba(201,162,39,0.18);
      --secretary: #3b82f6; --manager: #22c55e; --planner: #c9a227;
      --sns: #a855f7; --devil: #ef4444; --advisor: #94a3b8;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'Montserrat', 'Noto Sans JP', sans-serif; color: var(--text); }
    body { display: flex; flex-direction: column; }
    body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: linear-gradient(rgba(0,242,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,.03) 1px, transparent 1px); background-size: 44px 44px; }
    .z1 { position: relative; z-index: 1; }

    /* ヘッダー・エージェントバー */
    .hdr { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px 10px; border-bottom: 1px solid var(--border); }
    .logo-name { font-size: 15px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(120deg, #a37a15, var(--gold), var(--gold-lt), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200%; animation: gold-shift 4s linear infinite; }
    .clock { font-size: 18px; font-weight: 200; letter-spacing: 2px; }

    .agent-bar { flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 20px 24px 10px; border-bottom: 1px solid var(--border); }
    .agent-slot { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 0 15px; cursor: pointer; transition: transform .3s; }
    .portrait-wrap { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border); overflow: hidden; position: relative; background: var(--bg2); display: flex; align-items: center; justify-content: center; }
    .agent-sprite { position: absolute; width: 650%; height: auto; pointer-events: none; }
    .agent-id { font-size: 10px; font-weight: 900; color: var(--muted); letter-spacing: 1.5px; margin-top: 5px; }

    /* ── ボディ・グリッド（補強済み） ── */
    .body-grid { flex: 1; display: flex; padding: 12px 24px 0; overflow: hidden; min-height: 0; }
    .chat-wrap { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
    
    /* grid-template-rows: 1fr で高さを強制固定 */
    .agent-cols { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: 1fr; gap: 6px; padding: 10px; overflow: hidden; }
    
    .agent-col { display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,.07); border-radius: 12px; background: rgba(255,255,255,.01); }
    .agent-col-hdr { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,.07); font-size: 10px; font-weight: 900; text-align: center; flex-shrink: 0; }
    .agent-col-body { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; }
    .col-msg { background: rgba(255,255,255,.03); border-radius: 8px; padding: 12px; font-size: 11px; line-height: 1.7; border-left: 3px solid; white-space: pre-wrap; word-break: break-word; cursor: pointer; animation: msg-drop 0.4s ease both; }

    /* カラー継承 */
    .col-secretary .agent-col-hdr { border-top: 3px solid var(--secretary); color: var(--secretary); } .col-secretary .col-msg { border-color: var(--secretary); }
    .col-manager .agent-col-hdr { border-top: 3px solid var(--manager); color: var(--manager); } .col-manager .col-msg { border-color: var(--manager); }
    .col-planner .agent-col-hdr { border-top: 3px solid var(--planner); color: var(--planner); } .col-planner .col-msg { border-color: var(--planner); }
    .col-sns .agent-col-hdr { border-top: 3px solid var(--sns); color: var(--sns); } .col-sns .col-msg { border-color: var(--sns); }
    .col-devil .agent-col-hdr { border-top: 3px solid var(--devil); color: var(--devil); } .col-devil .col-msg { border-color: var(--devil); }
    .col-advisor .agent-col-hdr { border-top: 3px solid var(--advisor); color: var(--advisor); } .col-advisor .col-msg { border-color: var(--advisor); }
    .col-interrogation .agent-col-hdr { border-top: 3px solid var(--cyan); color: var(--cyan); } .col-interrogation .col-msg { border-color: var(--cyan); }

    /* フッター */
    .input-footer { padding: 16px 24px 20px; border-top: 1px solid var(--border); }
    .input-main { display: flex; gap: 12px; }
    .text-field { flex: 1; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--text); outline: none; resize: none; min-height: 50px; font-family: inherit; font-size: 14px; }
    .exec-btn { width: 130px; background: linear-gradient(135deg, var(--gold), var(--gold-lt)); border: none; border-radius: 12px; font-weight: 900; cursor: pointer; color: #000; letter-spacing: 2px; }

    /* モーダル */
    .wl-overlay, .expand-overlay { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(4,9,18,.85); backdrop-filter: blur(12px); align-items: center; justify-content: center; }
    .wl-overlay.open, .expand-overlay.open { display: flex; }
    .wl-modal, .expand-modal { width: 80vw; height: 84vh; background: #0b1424; border: 1px solid rgba(0,242,255,.2); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
    .expand-modal { width: 60vw; height: 70vh; }
    .wl-hdr, .expand-hdr { padding: 15px; border-bottom: 1px solid rgba(255,255,255,.1); display: flex; align-items: center; justify-content: space-between; }
    .wl-log, .expand-body { flex: 1; overflow-y: auto; padding: 20px; }
    .wl-footer { padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
    .wl-textarea { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: white; padding: 10px; resize: none; }
    .loading-veil { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(7,13,26,.95); align-items: center; justify-content: center; flex-direction: column; }
    .loading-veil.on { display: flex; }
  </style>
</head>
<body>

<header class="hdr z1">
  <div class="logo-name">SHONAN CENTRAL BEACON</div>
  <div class="clock" id="clock">--:--</div>
</header>

<div class="agent-bar z1">
  <div class="agent-slot" id="slot-SECRETARY" onclick="openWalluchi('SECRETARY')"><div class="portrait-wrap" id="pw-SECRETARY"></div><div class="agent-id">秘書</div></div>
  <div class="agent-slot" id="slot-MANAGER" onclick="openWalluchi('MANAGER')"><div class="portrait-wrap" id="pw-MANAGER"></div><div class="agent-id">マネージャー</div></div>
  <div class="agent-slot" id="slot-PLANNER" onclick="openWalluchi('PLANNER')"><div class="portrait-wrap" id="pw-PLANNER"></div><div class="agent-id">プランナー</div></div>
  <div class="agent-slot" id="slot-SNS" onclick="openWalluchi('SNS')"><div class="portrait-wrap" id="pw-SNS"></div><div class="agent-id">SNS</div></div>
  <div class="agent-slot" id="slot-DEVIL" onclick="openWalluchi('DEVIL')"><div class="portrait-wrap" id="pw-DEVIL"></div><div class="agent-id">Devil</div></div>
  <div class="agent-slot" id="slot-ADVISOR" onclick="openWalluchi('ADVISOR')"><div class="portrait-wrap" id="pw-ADVISOR"></div><div class="agent-id">相談役</div></div>
</div>

<div class="body-grid z1">
  <div class="chat-wrap">
    <div class="agent-cols" id="agentCols">
      <div class="agent-col col-secretary"><div class="agent-col-hdr">📋 秘書</div><div class="agent-col-body" id="colbody-SECRETARY"></div></div>
      <div class="agent-col col-manager"><div class="agent-col-hdr">📈 マネージャー</div><div class="agent-col-body" id="colbody-MANAGER"></div></div>
      <div class="agent-col col-planner"><div class="agent-col-hdr">💡 プランナー</div><div class="agent-col-body" id="colbody-PLANNER"></div></div>
      <div class="agent-col col-sns"><div class="agent-col-hdr">📱 SNS</div><div class="agent-col-body" id="colbody-SNS"></div></div>
      <div class="agent-col col-devil"><div class="agent-col-hdr">😈 Devil</div><div class="agent-col-body" id="colbody-DEVIL"></div></div>
      <div class="agent-col col-advisor"><div class="agent-col-hdr">👴 相談役</div><div class="agent-col-body" id="colbody-ADVISOR"></div></div>
      <div class="agent-col col-interrogation"><div class="agent-col-hdr">▸ INTERROGATION</div><div class="agent-col-body" id="colbody-INTERROGATION"></div></div>
    </div>
  </div>
</div>

<div class="input-footer z1">
  <div class="input-main">
    <button class="exec-btn" style="width:auto; padding:0 15px; background:rgba(255,255,255,0.05); color:var(--text); font-size:10px;" onclick="openWalluchi()">🗣️ 壁打ち</button>
    <textarea id="textField" class="text-field" placeholder="経営課題を入力してください..."></textarea>
    <button class="exec-btn" id="execBtn" onclick="startAnalysis()">EXECUTE</button>
  </div>
</div>

<div class="wl-overlay" id="wlOverlay"><div class="wl-modal"><div class="wl-hdr"><div id="wlAgentName">WALL MODE</div><button onclick="closeWalluchi()">✕</button></div><div class="wl-log" id="wlLog"></div><div class="wl-footer"><textarea class="wl-textarea" id="wlInput" placeholder="メッセージを入力..."></textarea><button class="exec-btn" onclick="sendWalluchi()">SEND</button></div></div></div>
<div class="expand-overlay" id="expandOverlay"><div class="expand-modal"><div class="expand-hdr"><div id="expandAgentTag">DETAIL</div><button onclick="closeExpand()">✕</button></div><div class="expand-body" id="expandBody"></div></div></div>
<div class="loading-veil" id="loadVeil"><div class="logo-name">ANALYZING MISSION...</div></div>

<script>
  const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzKBCWxdwhsW4mSA0V1e3BNOsmreIc4D1n-wsPBvnmGvhe71Pz1XOdO7_EUDA-GYosuQA/exec';
  const AGENT_SPRITE_URL = 'https://drive.google.com/thumbnail?id=1RtTNCmLyT3Wt85tHgor95DBGTECnWSAH&sz=w1200';

  // 精密座標死守
  const SPRITE_CONFIG = {
    SECRETARY: '-45%', MANAGER: '-148%', PLANNER: '-250%', SNS: '-352%', DEVIL: '-418%', ADVISOR: '-515%'
  };
  const AGENT_KEYS = ['SECRETARY', 'MANAGER', 'PLANNER', 'SNS', 'DEVIL', 'ADVISOR'];

  // 正規表現強化：AIが太字（**）などで装飾してきても、役職名を正確にキャッチする
  const OTHER_TAGS = '(?=\\[(?:秘書|SECRETARY|マネージャー|MANAGER|プランナー|PLANNER|SNS|Devil|相談役|ADVISOR|逆質問|INTERROGATION|CMO|CFO|COO|CLO)\\]|\\*\\*\\[|$)';
  const AGENT_REGEX = {
    SECRETARY: new RegExp('(?:\\[|\\*\\*\\[)(?:秘書|SECRETARY|CMO)(?:\\]|\\*\\*\\])[:：]?\\s*([\\s\\S]*?)' + OTHER_TAGS, 'i'),
    MANAGER:   new RegExp('(?:\\[|\\*\\*\\[)(?:マネージャー|MANAGER|CFO)(?:\\]|\\*\\*\\])[:：]?\\s*([\\s\\S]*?)' + OTHER_TAGS, 'i'),
    PLANNER:   new RegExp('(?:\\[|\\*\\*\\[)(?:プランナー|PLANNER|COO)(?:\\]|\\*\\*\\])[:：]?\\s*([\\s\\S]*?)' + OTHER_TAGS, 'i'),
    SNS:       new RegExp('(?:\\[|\\*\\*\\[)(?:SNS|CLO)(?:\\]|\\*\\*\\])[:：]?\\s*([\\s\\S]*?)' + OTHER_TAGS, 'i'),
    DEVIL:     new RegExp('(?:\\[|\\*\\*\\[)(?:Devil|デビル)(?:\\]|\\*\\*\\])[:：]?\\s*([\\s\\S]*?)' + OTHER_TAGS, 'i'),
    ADVISOR:   new RegExp('(?:\\[|\\*\\*\\[)(?:相談役|ADVISOR)(?:\\]|\\*\\*\\])[:：]?\\s*([\\s\\S]*?)' + OTHER_TAGS, 'i'),
    INTERROGATION: new RegExp('(?:\\[|\\*\\*\\[)(?:逆質問|INTERROGATION)(?:\\]|\\*\\*\\])[:：]?\\s*([\\s\\S]*?)' + OTHER_TAGS, 'i')
  };

  window.addEventListener('load', () => {
    AGENT_KEYS.forEach(k => {
      const wrap = document.getElementById('pw-' + k);
      const img = document.createElement('img');
      img.className = 'agent-sprite';
      img.src = AGENT_SPRITE_URL;
      img.style.left = SPRITE_CONFIG[k];
      img.style.marginTop = (k==='DEVIL')?'45px':'20px';
      wrap.appendChild(img);
    });
    tick(); setInterval(tick, 1000);
    loadState();
  });

  function tick() { const n = new Date(); document.getElementById('clock').textContent = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0'); }

  async function startAnalysis() {
    const input = document.getElementById('textField').value.trim();
    if (!input) return;
    AGENT_KEYS.forEach(k => document.getElementById('slot-' + k).classList.add('thinking'));
    document.getElementById('loadVeil').classList.add('on');
    try {
      const res = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ mode: 'CHATTING', userInput: input }) });
      const result = await res.json();
      if (result.status === 'success') renderResult(result.data);
    } catch (e) { console.error(e); }
    document.getElementById('loadVeil').classList.remove('on');
    AGENT_KEYS.forEach(k => document.getElementById('slot-' + k).classList.remove('thinking'));
  }

  function renderResult(aiText) {
    // 描画間隔を 600ms -> 300ms に高速化してラグ感を軽減
    AGENT_KEYS.concat(['INTERROGATION']).forEach((k, i) => {
      setTimeout(() => {
        const match = aiText.match(AGENT_REGEX[k]);
        if (match) {
          let text = match[1].trim();
          // システムゴミ取り
          text = text.replace(/^"?[A-Zぁ-んァ-ヶー一-龠]+"?:?\s*/, '').replace(/"$/, '').trim();
          if (text.length > 5) addColMsg(k, text);
        }
      }, i * 300);
    });
  }

  function addColMsg(k, t) {
    const body = document.getElementById('colbody-' + k);
    if (!body) return;
    const div = document.createElement('div');
    div.className = 'col-msg';
    div.innerHTML = `<div style="font-size:8px; opacity:0.3; margin-bottom:4px;">${new Date().toLocaleTimeString()}</div>${t}`;
    div.onclick = () => openExpand(k, t);
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
    saveState();
  }

  // 壁打ち・保存
  let wlSelectedAgent = 'SECRETARY';
  function openWalluchi(k) { if(k) wlSelectedAgent = k; document.getElementById('wlOverlay').classList.add('open'); document.getElementById('wlAgentName').innerText = wlSelectedAgent + ' WALL'; }
  function closeWalluchi() { document.getElementById('wlOverlay').classList.remove('open'); }
  async function sendWalluchi() {
    const input = document.getElementById('wlInput').value.trim();
    if(!input) return;
    const log = document.getElementById('wlLog');
    log.innerHTML += `<div style="text-align:right; margin-bottom:10px;"><b>YOU:</b> ${input}</div>`;
    document.getElementById('wlInput').value = '';
    try {
      const res = await fetch(GAS_API_URL, { method:'POST', body:JSON.stringify({userInput:input, agent:wlSelectedAgent}) });
      const result = await res.json();
      log.innerHTML += `<div style="margin-bottom:10px; color:var(--cyan);"><b>${wlSelectedAgent}:</b> ${result.data}</div>`;
      log.scrollTop = log.scrollHeight;
    } catch(e) {}
  }
  function openExpand(k, t) { document.getElementById('expandAgentTag').innerText = k; document.getElementById('expandBody').innerText = t; document.getElementById('expandOverlay').classList.add('open'); }
  function closeExpand() { document.getElementById('expandOverlay').classList.remove('open'); }
  function saveState() { localStorage.setItem('BEACON_V5_SAVE', JSON.stringify({ body: document.getElementById('agentCols').innerHTML })); }
  function loadState() { const saved = localStorage.getItem('BEACON_V5_SAVE'); if(saved) { document.getElementById('agentCols').innerHTML = JSON.parse(saved).body; } }
</script>
</body>
</html>
